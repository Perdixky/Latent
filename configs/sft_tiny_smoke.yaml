model_name: outputs/tiny_smoke_model
seed: 42

train_path: data/processed/train_sft.jsonl
valid_path: data/processed/valid_sft.jsonl
output_dir: outputs/tiny_smoke_sft

max_length: 512

per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 1
dataloader_num_workers: 0

learning_rate: 1.0e-4
weight_decay: 0.01
lr_scheduler_type: cosine
warmup_ratio: 0.0
optim: adamw_torch
label_smoothing_factor: 0.0
num_train_epochs: 1
max_steps: 1

bf16: false
fp16: false
device_map: null
gradient_checkpointing: false

use_lora: false

logging_steps: 1
eval_steps: 1
save_steps: 1
save_total_limit: 1
load_best_model_at_end: false
report_to: none
